<!DOCTYPE html>
<html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Badges | Kaufmännisches Rechnen</title><link rel="stylesheet" href="assets/css/style.css"></head><body>
<a class="skip-link" href="#main">Zum Inhalt springen</a><div class="app-shell"><nav class="navbar"><a class="navbtn secondary" href="index.html">← Dashboard</a><a class="navbtn secondary" href="fortschritt.html">Fortschritt</a></nav><header class="hero"><h1>Badges</h1><p class="subtitle">Belohnungen für Lernfortschritt</p></header><main id="main" class="content"><p class="intro">Badges werden nur lokal auf diesem Gerät berechnet. Es gibt keine Rangliste und keine Namen.</p><section class="reward-grid" id="badgesGrid"></section></main><footer class="footer">Kaufmännisches Rechnen · Version 1.1.0</footer></div><script src="assets/js/storage.js"></script><script src="assets/js/gamification.js"></script><script>
function render(){const t=totalProgress();const earned=new Set(badgeList(t).map(b=>b.id));const grid=document.getElementById('badgesGrid');grid.innerHTML='';allBadges().forEach(b=>{const ok=earned.has(b.id);const el=document.createElement('article');el.className='reward-card '+(ok?'':'locked');el.innerHTML=`<span class="reward-icon">${b.icon}</span><h2>${b.label}</h2><p>${b.desc}</p><span class="badge ${ok?'green':''}">${ok?'freigeschaltet':'gesperrt'}</span>`;grid.appendChild(el);});}render();
</script></body></html>
